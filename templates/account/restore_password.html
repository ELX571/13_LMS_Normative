{% extends 'base.html' %}

{% block title %}
    Restore Password
{% endblock %}

{% block content %}

<div class="restore-container">
    <form method="post" class="restore-form">
        {% csrf_token %}

        <h1>Restore Password</h1>
        <p>Emailingizni kiriting 🔐</p>

        <input type="email" name="email" placeholder="Email..." required>

        <button type="submit">Send Link</button>
    </form>
</div>

<style>
    .restore-container{
        display:flex;
        justify-content:center;
        align-items:center;
        height:80vh;
    }

    .restore-form{
        width:350px;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
        text-align:center;
        background:white;
    }

    .restore-form h1{
        margin-bottom:10px;
    }

    .restore-form p{
        color:gray;
        margin-bottom:20px;
    }

    .restore-form input{
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border:1px solid #ccc;
        border-radius:10px;
        outline:none;
    }

    .restore-form button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#007bff;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .restore-form button:hover{
        background:#0056b3;
    }
</style>

{% endblock %}
